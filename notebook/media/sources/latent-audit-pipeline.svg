<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E8442C"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ECEDEE"/>

  <!-- Title -->
  <text x="80" y="86" font-size="34" font-weight="bold" fill="#1a1a1a">Can you read the physics back out?</text>
  <text x="80" y="122" font-size="19" fill="#555" font-family="DejaVu Sans Mono, monospace">ONE HIDDEN-MASS INTERVENTION &#183; THREE READ-OUT PATHWAYS &#183; MATCHED 12-DIM CAPACITY</text>

  <!-- ============ LEFT: intervention ============ -->
  <rect x="80" y="180" width="330" height="560" fill="#F4F5F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="220" font-size="15" fill="#E8442C" font-family="DejaVu Sans Mono, monospace">INTERVENTION</text>
  <text x="100" y="256" font-size="21" font-weight="bold" fill="#1a1a1a">Simulated physical system</text>

  <!-- two pendulums: baseline and hidden-mass -->
  <g stroke="#1a1a1a" stroke-width="2.5" fill="none">
    <line x1="120" y1="310" x2="390" y2="310" stroke-width="3"/>
    <!-- baseline -->
    <line x1="175" y1="310" x2="145" y2="440"/>
    <circle cx="145" cy="440" r="16" fill="#1a1a1a"/>
    <!-- hidden mass -->
    <line x1="315" y1="310" x2="345" y2="440"/>
    <circle cx="345" cy="440" r="24" fill="#E8442C" stroke="#E8442C"/>
  </g>
  <text x="118" y="486" font-size="15" fill="#555">baseline mass</text>
  <text x="300" y="498" font-size="15" fill="#E8442C">hidden mass &#916;m</text>

  <text x="100" y="560" font-size="16" fill="#1a1a1a">Mass is changed; the change is</text>
  <text x="100" y="584" font-size="16" fill="#1a1a1a">never labelled. Its consequence</text>
  <text x="100" y="608" font-size="16" fill="#1a1a1a">is well-posed in the dynamics</text>
  <text x="100" y="632" font-size="16" fill="#1a1a1a">and rendered only as pixels.</text>

  <text x="100" y="700" font-size="15" fill="#555" font-family="DejaVu Sans Mono, monospace">RENDERED &#8594; RAW FRAMES</text>

  <!-- arrows from left panel to three pathways -->
  <line x1="410" y1="300" x2="520" y2="300" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="410" y1="460" x2="520" y2="460" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="410" y1="620" x2="520" y2="620" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ============ MIDDLE: three pathways ============ -->
  <!-- Pathway 1 -->
  <rect x="530" y="240" width="470" height="120" fill="#F4F5F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="550" y="272" font-size="15" fill="#555" font-family="DejaVu Sans Mono, monospace">PATHWAY 1 &#183; UPPER BOUND</text>
  <text x="550" y="302" font-size="20" font-weight="bold" fill="#1a1a1a">Analytic auditor</text>
  <text x="550" y="330" font-size="15.5" fill="#555">reads the physical state directly</text>

  <!-- Pathway 2 -->
  <rect x="530" y="400" width="470" height="120" fill="#F4F5F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="550" y="432" font-size="15" fill="#555" font-family="DejaVu Sans Mono, monospace">PATHWAY 2 &#183; CONTROL</text>
  <text x="550" y="462" font-size="20" font-weight="bold" fill="#1a1a1a">Probe on raw pixels</text>
  <text x="550" y="490" font-size="15.5" fill="#555">matched 12-dim capacity &#8212; is the signal in the frames?</text>

  <!-- Pathway 3 -->
  <rect x="530" y="560" width="470" height="120" fill="#F4F5F6" stroke="#E8442C" stroke-width="2.5"/>
  <text x="550" y="592" font-size="15" fill="#E8442C" font-family="DejaVu Sans Mono, monospace">PATHWAY 3 &#183; UNDER TEST</text>
  <text x="550" y="622" font-size="20" font-weight="bold" fill="#1a1a1a">Autoencoder latent difference</text>
  <text x="550" y="650" font-size="15.5" fill="#555">reconstruction-trained, same 12 dims</text>

  <!-- arrows pathways -> results -->
  <line x1="1000" y1="300" x2="1090" y2="300" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1000" y1="460" x2="1090" y2="460" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1000" y1="620" x2="1090" y2="620" stroke="#E8442C" stroke-width="2.5" marker-end="url(#arrRed)"/>

  <!-- ============ RIGHT: results as horizontal bars ============ -->
  <text x="1100" y="220" font-size="15" fill="#555" font-family="DejaVu Sans Mono, monospace">RECOVERY OF THE CONSEQUENCE (R&#178;)</text>

  <!-- axis: x from 1100 (R2=-0.3) to 1520 (R2=1.0); zero at 1100 + 0.3/1.3*420 = 1196.9 -->
  <!-- zero line -->
  <line x1="1197" y1="240" x2="1197" y2="700" stroke="#999" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="1189" y="726" font-size="14" fill="#777" font-family="DejaVu Sans Mono, monospace">0</text>
  <text x="1508" y="726" font-size="14" fill="#777" font-family="DejaVu Sans Mono, monospace">1</text>

  <!-- bar 1: 0.992 -> width 0.992/1.3*420 = 320.4 from x=1197 -->
  <rect x="1197" y="278" width="320" height="44" fill="#1a1a1a"/>
  <text x="1210" y="307" font-size="19" font-weight="bold" fill="#ECEDEE" font-family="DejaVu Sans Mono, monospace">0.992</text>

  <!-- bar 2: 0.716 -> width 231.3 -->
  <rect x="1197" y="438" width="231" height="44" fill="#6b6f73"/>
  <text x="1210" y="467" font-size="19" font-weight="bold" fill="#ECEDEE" font-family="DejaVu Sans Mono, monospace">0.716</text>

  <!-- bar 3: -0.175 -> width 0.175/1.3*420 = 56.5, extending left from 1197 -->
  <rect x="1140" y="598" width="57" height="44" fill="#E8442C"/>
  <text x="1210" y="627" font-size="19" font-weight="bold" fill="#E8442C" font-family="DejaVu Sans Mono, monospace">&#8722;0.175</text>

  <!-- ============ Bottom takeaway ============ -->
  <line x1="80" y1="778" x2="1520" y2="778" stroke="#1a1a1a" stroke-width="1"/>
  <text x="80" y="826" font-size="24" font-weight="bold" fill="#1a1a1a">The consequence survives in the pixels (0.716) &#8212; the reconstruction objective discards it (&#8722;0.175).</text>
  <text x="80" y="862" font-size="16" fill="#555" font-family="DejaVu Sans Mono, monospace">github.com/USinani/world-model-latent-audit &#183; sinani.ai/latent-audit</text>
</svg>
